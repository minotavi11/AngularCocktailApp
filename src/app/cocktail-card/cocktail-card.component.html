<div>
  <div class="d-flex justify-content-center">
    <img class="grows" [src]="cocktail.image" height="200px" />
  </div>
  <div class="d-flex justify-content-center pt-2">
    <button [ngClass]="{'btn btn-secondary': true}" (click)="onClick()">
      {{ cocktail.name | titlecase }}
    </button>
  </div>
  <p [hidden]="!showDescription">{{ cocktail.description }}</p>
</div>
